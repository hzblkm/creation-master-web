name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers (${{ matrix.browser }})
        working-directory: frontend
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Set backend env (SQLite)
        working-directory: backend
        run: |
          echo "DATABASE_URL=file:./prisma/dev.db" >> .env
          echo "NODE_ENV=test" >> .env
          cat .env

      - name: Prepare database schema (Prisma db push)
        working-directory: backend
        run: npx prisma db push

      - name: Run E2E tests (Playwright - ${{ matrix.browser }})
        working-directory: frontend
        env:
          NODE_ENV: test
        run: npx playwright test -c playwright.config.ts --reporter=github --project=${{ matrix.browser }}

      - name: Upload Playwright test-results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.browser }}
          path: frontend/test-results
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: frontend/playwright-report
          retention-days: 7
name: E2E Playwright Matrix

on:
  push:
    branches: [ main, develop, feature/**, ci/** ]
  pull_request:

jobs:
  e2e:
    name: E2E on ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Build (Vite)
        working-directory: frontend
        run: npm run build

      - name: Start preview server (Vite)
        working-directory: frontend
        run: |
          nohup npx -y vite preview --port 5173 --strictPort >/dev/null 2>&1 &
          npx -y wait-on http://localhost:5173

      - name: Run Playwright tests (${{ matrix.browser }})
        working-directory: frontend
        run: npx playwright test -c playwright.config.ts --project=${{ matrix.browser }}

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.browser }}
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore